name: Accessibility Scan

run-name: "scan-${{ inputs.scan_token }}"

on:
  workflow_dispatch:
    inputs:
      scan_token:
        description: "Unique scan token"
        required: true
        type: string
      target_url:
        description: "Target URL"
        required: true
        type: string
      github_repo_url:
        description: "Optional source repo URL"
        required: false
        type: string
      axe_tags:
        description: "Comma-separated axe tags"
        required: false
        type: string
      engines:
        description: "Comma-separated engines to run (axe,cdp,pa11y). Default: all"
        required: false
        type: string
      max_routes:
        description: "Maximum pages to crawl"
        required: false
        type: string
      crawl_depth:
        description: "BFS crawl depth (1-3)"
        required: false
        type: string
      wait_until:
        description: "Page load strategy (domcontentloaded|load|networkidle)"
        required: false
        type: string
      timeout_ms:
        description: "Network timeout per page in ms"
        required: false
        type: string
      viewport:
        description: "Viewport as WxH (e.g. 1280x800)"
        required: false
        type: string
      color_scheme:
        description: "Emulated color scheme (light|dark)"
        required: false
        type: string

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Install Puppeteer Chrome (required by pa11y)
        run: node "$(find node_modules -path '*/puppeteer/install.mjs' -print -quit)"

      - name: Loading website
        run: echo "Preparing scan of ${{ inputs.target_url }}"

      - name: Running accessibility scans
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          AUDIT_DIR=".audit"
          mkdir -p $AUDIT_DIR

          AXE_TAGS_ARG=""
          if [ -n "${{ inputs.axe_tags }}" ]; then
            AXE_TAGS_ARG="--axe-tags ${{ inputs.axe_tags }}"
          fi

          REPO_URL_ARG=""
          if [ -n "${{ inputs.github_repo_url }}" ]; then
            REPO_URL_ARG="--repo-url ${{ inputs.github_repo_url }}"
          fi

          ENGINES_ARG=""
          if [ -n "${{ inputs.engines }}" ]; then
            ENGINES_ARG="--engines ${{ inputs.engines }}"
          fi

          MAX_ROUTES_ARG="--max-routes 1"
          if [ -n "${{ inputs.max_routes }}" ]; then
            MAX_ROUTES_ARG="--max-routes ${{ inputs.max_routes }}"
          fi

          CRAWL_DEPTH_ARG=""
          if [ -n "${{ inputs.crawl_depth }}" ]; then
            CRAWL_DEPTH_ARG="--crawl-depth ${{ inputs.crawl_depth }}"
          fi

          WAIT_UNTIL_ARG=""
          if [ -n "${{ inputs.wait_until }}" ]; then
            WAIT_UNTIL_ARG="--wait-until ${{ inputs.wait_until }}"
          fi

          TIMEOUT_ARG=""
          if [ -n "${{ inputs.timeout_ms }}" ]; then
            TIMEOUT_ARG="--timeout-ms ${{ inputs.timeout_ms }}"
          fi

          VIEWPORT_ARG=""
          if [ -n "${{ inputs.viewport }}" ]; then
            VIEWPORT_ARG="--viewport ${{ inputs.viewport }}"
          fi

          COLOR_SCHEME_ARG=""
          if [ -n "${{ inputs.color_scheme }}" ]; then
            COLOR_SCHEME_ARG="--color-scheme ${{ inputs.color_scheme }}"
          fi

          pnpm exec a11y-audit \
            --base-url "${{ inputs.target_url }}" \
            $MAX_ROUTES_ARG \
            --with-reports \
            --output $AUDIT_DIR/report.html \
            $REPO_URL_ARG \
            --github-token "${{ secrets.GH_TOKEN }}" \
            $AXE_TAGS_ARG \
            $ENGINES_ARG \
            $CRAWL_DEPTH_ARG \
            $WAIT_UNTIL_ARG \
            $TIMEOUT_ARG \
            $VIEWPORT_ARG \
            $COLOR_SCHEME_ARG

      - name: Powering up your report
        run: echo "Preparing report bundle"

      - name: Prepare artifact bundle
        run: |
          AUDIT_DIR=".audit"
          # Resolve the real engine .audit dir (pnpm stores packages in .pnpm/ deep paths)
          ENGINE_AUDIT=$(node -e "const p=require('path'),fs=require('fs'); const r=fs.realpathSync(p.join('node_modules','@diegovelasquezweb','a11y-engine')); console.log(p.join(r,'.audit'))")
          mkdir -p out

          # result.json — prefer engine's findings, fall back to project .audit
          FINDINGS_PATH=""
          if [ -f "$ENGINE_AUDIT/a11y-findings.json" ]; then
            FINDINGS_PATH="$ENGINE_AUDIT/a11y-findings.json"
          elif [ -f "$AUDIT_DIR/a11y-findings.json" ]; then
            FINDINGS_PATH="$AUDIT_DIR/a11y-findings.json"
          fi

          # Include pattern findings if they exist
          PATTERN_FINDINGS="null"
          if [ -f "$ENGINE_AUDIT/a11y-pattern-findings.json" ]; then
            PATTERN_FINDINGS=$(cat "$ENGINE_AUDIT/a11y-pattern-findings.json")
          elif [ -f "$AUDIT_DIR/a11y-pattern-findings.json" ]; then
            PATTERN_FINDINGS=$(cat "$AUDIT_DIR/a11y-pattern-findings.json")
          fi

          if [ -n "$FINDINGS_PATH" ]; then
            node -e "
              const fs = require('fs');
              const data = JSON.parse(fs.readFileSync('$FINDINGS_PATH','utf8'));
              data.metadata = data.metadata || {};
              data.metadata.target_url = '${{ inputs.target_url }}';
              data.patternFindings = $PATTERN_FINDINGS;
              fs.writeFileSync('out/result.json', JSON.stringify(data));
            "
          else
            echo "{\"findings\":[],\"metadata\":{\"target_url\":\"${{ inputs.target_url }}\"},\"patternFindings\":$PATTERN_FINDINGS}" > out/result.json
          fi
          # checklist
          cp $AUDIT_DIR/checklist.html out/checklist.html 2>/dev/null || echo "<html><body>No checklist generated</body></html>" > out/checklist.html
          # PDF
          cp $AUDIT_DIR/report.pdf out/stakeholder.pdf 2>/dev/null || touch out/stakeholder.pdf

          # screenshots (used by Visual Evidence tab)
          mkdir -p out/screenshots
          if [ -d "$ENGINE_AUDIT/screenshots" ]; then
            cp -R "$ENGINE_AUDIT/screenshots/." out/screenshots/
          elif [ -d "$AUDIT_DIR/screenshots" ]; then
            cp -R "$AUDIT_DIR/screenshots/." out/screenshots/
          fi

      - name: Upload scan artifact
        uses: actions/upload-artifact@v4
        with:
          name: scan-${{ inputs.scan_token }}
          path: out/**
          retention-days: 7
